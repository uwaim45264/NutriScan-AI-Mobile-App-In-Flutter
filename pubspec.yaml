name: nutriscan
description: "An AI-powered nutrition assistant that scans food, analyzes nutrients, and generates personalized diet plans."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  dart_openai: ^5.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  http: ^1.2.1
  mobile_scanner: ^5.1.1
  image: ^4.2.0
  video_player: ^2.8.1
  supabase_flutter: ^2.6.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/1.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icons_background: "#ffffff"
  adaptive_icons_foreground: "assets/imaged/1.png"
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/videos/
